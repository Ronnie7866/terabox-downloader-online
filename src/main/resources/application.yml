server:
  port: 8000
  servlet:
    context-path: /

spring:
  application:
    name: terabox-api-sp

# TeraBox API Configuration
terabox:
  # Array of cookies - Add your cookies here
  cookies:

  
  # HTTP Client Configuration
  http:
    connect-timeout: 30000  # 30 seconds
    read-timeout: 60000     # 60 seconds
    write-timeout: 60000    # 60 seconds
  
  # Retry Configuration
  retry:
    max-attempts: 3
    backoff-delay: 2000  # 2 seconds

  # Async Configuration (for parallel processing)
  async:
    enabled: true           # Enable/disable async processing
    core-pool-size: 10      # Core thread pool size
    max-pool-size: 50       # Maximum thread pool size
    queue-capacity: 100     # Task queue capacity

  # Proxy Configuration (DC Proxy)
  proxy:
    enabled: true
    username: ""
    password: ""
    host: ""
    start-port: 
    end-port: 

# Logging Configuration
logging:
  level:
    root: INFO
    com.terabox.api: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

