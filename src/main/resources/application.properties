# Server Configuration
server.port=8000
server.servlet.context-path=/
  
  # Spring Application Configuration
spring.application.name=terabox-api-sp
  
  # TeraBox API Configuration
  # Array of cookies - Add your cookies here
terabox.cookies=
  
  # HTTP Client Configuration
terabox.http.connect-timeout=30000
terabox.http.read-timeout=60000
terabox.http.write-timeout=60000
  
  # Retry Configuration
terabox.retry.max-attempts=3
terabox.retry.backoff-delay=2000
  
  # Async Configuration (for parallel processing)
terabox.async.enabled=true
terabox.async.core-pool-size=10
terabox.async.max-pool-size=50
terabox.async.queue-capacity=100
  
  # Proxy Configuration (DC Proxy)
terabox.proxy.enabled=false
terabox.proxy.username=adfafdsf
terabox.proxy.password=adsfadsf44
terabox.proxy.host=google.com
terabox.proxy.start-port=10001
terabox.proxy.end-port=10003
  
  # Logging Configuration
logging.level.root=INFO
logging.level.com.terabox.api=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

  # GitHub Configuration
github.repo.owner=Ronnie7866
github.repo.name=Cookie
github.token=